# ==============================================================================
# TokyoNight Color Variables
# ==============================================================================

set -g @thm_bg "#222436"
set -g @thm_blue "#82aaff"
set -g @thm_overlay_0 "#444a73"
set -g @thm_surface_0 "#828bb8"
set -g @thm_peach "#ff966c"
set -g @thm_rosewater "#c8d3f5"
set -g @thm_red "#ff757f"
set -g @thm_green "#c3e88d"
set -g @thm_yellow "#ffc777"
set -g @thm_maroon "#ff966c"

# ==============================================================================
# General Settings
# ==============================================================================

set -g prefix C-a
setw -g mode-keys vi
set -g mouse on
set -g @yank_with_mouse on
# Remain in copy mode after yanking text (for tmux-yank)
set -g @yank_action 'copy-pipe'
# FIXED: Use plain shell for Linux (reattach-to-user-namespace is macOS-only)
set-option -g default-command "$SHELL"
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

# ==============================================================================
# Key Bindings
# ==============================================================================
unbind C-b
bind C-a send-prefix
bind C-p previous-window
bind C-n next-window
bind R source-file ~/.tmux.conf \; display "Config reloaded!"

set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up   "C-k"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_prev ""  # disables C-\ binding


# ==============================================================================
# Status Bar Configuration
# ==============================================================================

set -g status-position top
set -g status-justify right
set -g status-style "none"

# Status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=#{@thm_overlay_0},none]"

# ==============================================================================
# Pane Border Configuration
# ==============================================================================

setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "fg=#{@thm_surface_0}"
setw -g pane-border-style "fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# ==============================================================================
# Window Configuration
# ==============================================================================

set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "fg=#{@thm_surface_0}"
set -g window-status-last-style "fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# ==============================================================================
# TPM Plugin Management
# ==============================================================================

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
